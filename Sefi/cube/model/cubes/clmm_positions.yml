cubes:
  - name: clmm_positions
    sql_table: main.clmm_positions
    data_source: default

    joins: []

    dimensions:
      - name: position_id
        sql: position_id
        type: string
        primary_key: true

      - name: pool_address
        sql: lower(pool_address)
        type: string

      - name: vault_address
        sql: lower(vault_address)
        type: string

      - name: strategy_address
        sql: lower(strategy_address)
        type: string

      - name: owner_address
        sql: lower(owner_address)
        type: string

      - name: token0_symbol
        sql: token0_symbol
        type: string

      - name: token1_symbol
        sql: token1_symbol
        type: string

      - name: tick_lower
        sql: tick_lower
        type: number

      - name: tick_upper
        sql: tick_upper
        type: number

      - name: range_width
        sql: (tick_upper - tick_lower)
        type: number

      - name: liquidity
        sql: CAST(liquidity AS REAL)
        type: number

      - name: amount0
        sql: CAST(amount0 AS REAL)
        type: number

      - name: amount1
        sql: CAST(amount1 AS REAL)
        type: number

      - name: fees_owed0
        sql: CAST(fees_owed0 AS REAL)
        type: number

      - name: fees_owed1
        sql: CAST(fees_owed1 AS REAL)
        type: number

      - name: is_active
        sql: CASE WHEN is_active = 1 THEN 'true' ELSE 'false' END
        type: boolean

      - name: minted_at
        sql: minted_at
        type: time

      - name: last_updated_at
        sql: last_updated_at
        type: time

      - name: indexed_at
        sql: indexed_at
        type: time

    measures:
      - name: count
        type: count

      - name: active_positions
        type: count
        filters:
          - sql: "{CUBE.is_active} = 'true'"

      - name: total_liquidity
        sql: CAST(liquidity AS REAL)
        type: sum

      - name: avg_range_width
        sql: (tick_upper - tick_lower)
        type: avg
