cubes:
  - name: stats
    sql_table: main.stats
    data_source: default

    joins: []

    dimensions:
      - name: key
        sql: key
        type: string
        primary_key: true

      - name: value
        sql: value
        type: string

      - name: updated_at
        sql: updated_at
        type: time

    measures:
      - name: count
        type: count
