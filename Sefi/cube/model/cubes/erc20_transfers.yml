cubes:
  - name: erc20_transfers
    sql_table: main.erc20_transfers
    data_source: default

    joins:
      - name: contracts
        sql: "{CUBE.contract_id} = {contracts.contract_id}"
        relationship: many_to_one

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: contract_id
        sql: contract_id
        type: string

      - name: token_name
        sql: token_name
        type: string

      - name: from_address
        sql: from_address
        type: string

      - name: to_address
        sql: to_address
        type: string

      - name: amount
        sql: amount
        type: string

      - name: tx_hash
        sql: tx_hash
        type: string

      - name: log_index
        sql: log_index
        type: number

      - name: timestamp
        sql: >-
          CASE
            WHEN timestamp IS NULL OR timestamp = '' OR timestamp = '0.0' OR instr(timestamp, '.') = 0 THEN NULL
            ELSE datetime(CAST(substr(timestamp, 1, instr(timestamp, '.') - 1) AS INTEGER), 'unixepoch')
          END
        type: time

      - name: indexed_at
        sql: indexed_at
        type: time

    measures:
      - name: count
        type: count
